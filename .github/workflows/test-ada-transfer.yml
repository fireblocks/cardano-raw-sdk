name: Test ADA Transfer

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Cardano network'
        required: true
        default: 'mainnet'
        type: choice
        options:
          - preprod
          - mainnet
      amount_ada:
        description: 'Amount in ADA'
        required: true
        default: '3'
      source_vault:
        description: 'Source vault account ID'
        required: true
        default: '0'
      dest_vault:
        description: 'Destination vault account ID'
        required: true
        default: '1'

jobs:
  test-ada-transfer:
    runs-on: ubuntu-latest
    environment: tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Cache build
        uses: actions/cache@v4
        id: build-cache
        with:
          path: dist/
          key: build-${{ hashFiles('src/**/*.ts', 'tsconfig.json') }}

      - name: Build
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: npm run build

      - name: Run ADA transfer test
        env:
          FIREBLOCKS_API_USER_KEY: ${{ secrets.FIREBLOCKS_API_KEY }}
          FIREBLOCKS_API_USER_SECRET_KEY: ${{ secrets.FIREBLOCKS_API_SECRET }}
          IAGON_API_KEY: ${{ secrets.IAGON_API_KEY }}
          CARDANO_NETWORK: ${{ inputs.network }}
          TRANSFER_AMOUNT_ADA: ${{ inputs.amount_ada }}
          SOURCE_VAULT: ${{ inputs.source_vault }}
          DEST_VAULT: ${{ inputs.dest_vault }}
          FIREBLOCKS_BASE_PATH: ${{ secrets.FIREBLOCKS_BASE_PATH }}
        run: npx tsx scripts/test-ada-transfer.ts
